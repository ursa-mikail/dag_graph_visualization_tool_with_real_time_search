services:
  postgres:
    image: postgres:16
    container_name: netflow-postgres
    environment:
      POSTGRES_USER: netflow
      POSTGRES_PASSWORD: netflow_secret
      POSTGRES_DB: netflow
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - netflow_pgdata:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netflow -d netflow"]
      interval: 3s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netflow-backend
    environment:
      DATABASE_URL: postgres://netflow:netflow_secret@postgres:5432/netflow?sslmode=disable
      PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: netflow-frontend
    environment:
      BACKEND_HOST: backend
      BACKEND_PORT: 8081
    ports:
      - "3001:3001"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  netflow_pgdata:
